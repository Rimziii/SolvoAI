<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select Username - Solvo AI</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
  body { font-family: 'Inter', sans-serif; }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .animate-fade-in { animation: fadeInUp 0.8s ease-out forwards; }
</style>
</head>

<body class="bg-gradient-to-br from-indigo-900 via-purple-900 to-black text-white min-h-screen flex items-center justify-center relative overflow-hidden">

<div class="absolute w-[400px] h-[400px] bg-purple-600 rounded-full blur-[150px] opacity-30"></div>

<div class="bg-white/10 backdrop-blur-lg p-10 rounded-3xl border border-white/20 w-full max-w-md shadow-2xl animate-fade-in z-10">

  <h2 class="text-3xl font-bold text-center mb-2">Choose Your Username</h2>
  <p id="emailDisplay" class="text-center text-gray-300 mb-6 text-sm"></p>

  <!-- Full Name -->
  <div class="mb-4">
    <label class="block mb-2 text-sm text-gray-300">Full Name</label>
    <input type="text" id="fullname"
      class="w-full px-4 py-3 rounded-xl bg-white/20 text-white placeholder-white/60 outline-none border border-white/30 focus:border-purple-400 transition"
      placeholder="Enter your full name">
  </div>

  <button onclick="generateUsernames()"
    class="w-full py-3 rounded-xl bg-purple-600 font-semibold hover:bg-purple-700 transition shadow-lg mb-6">
    Suggest Usernames
  </button>

  <!-- Suggestions -->
  <div id="suggestions" class="space-y-3 mb-6"></div>

  <!-- OR Divider -->
  <div class="text-center text-gray-400 mb-4">OR</div>

  <!-- Custom Username -->
  <div class="mb-4">
    <label class="block mb-2 text-sm text-gray-300">Create Your Own Username</label>
    <input type="text" id="customUsername"
      class="w-full px-4 py-3 rounded-xl bg-white/20 text-white placeholder-white/60 outline-none border border-white/30 focus:border-purple-400 transition"
      placeholder="Enter custom username">
  </div>

  <button onclick="saveCustomUsername()"
    class="w-full py-3 rounded-xl bg-indigo-600 font-semibold hover:bg-indigo-700 transition shadow-lg">
    Confirm Username
  </button>

  <div id="message" class="mt-4 text-center text-sm"></div>

</div>

<script>
  const email = localStorage.getItem("registeredEmail");

  if (!email) {
    window.location.href = "signup.html";
  }

  document.getElementById("emailDisplay").innerText = "Registered Email: " + email;

  const takenUsernames = ["admin", "solvo", "testuser", "root"];

  function generateUsernames() {
    const name = document.getElementById("fullname").value.trim();
    const suggestionsDiv = document.getElementById("suggestions");

    if (!name) {
      alert("Please enter your full name.");
      return;
    }

    const base = name.split(" ")[0].toLowerCase();
    const random1 = Math.floor(Math.random() * 1000);
    const random2 = Math.floor(Math.random() * 9999);

    const suggestions = [
      base + random1,
      base + "_ai",
      base + "_official",
      base + random2,
      base + "." + new Date().getFullYear()
    ];

    suggestionsDiv.innerHTML = "";

    suggestions.forEach(username => {
      suggestionsDiv.innerHTML += `
        <div onclick="selectUsername('${username}')"
          class="cursor-pointer bg-white/10 border border-white/20 p-3 rounded-xl hover:bg-purple-600 transition text-center">
          ${username}
        </div>
      `;
    });
  }

  function selectUsername(username) {
    if (takenUsernames.includes(username.toLowerCase())) {
      showMessage("Username already taken ❌", "text-red-400");
      return;
    }

    localStorage.setItem("username", username);
    localStorage.setItem("solvoUser", username); // Save for chatbot
    showMessage("Username selected: " + username + " ✅ Redirecting...", "text-green-400");

    setTimeout(() => {
      window.location.href = "login.html";
    }, 1500);
  }

  function saveCustomUsername() {
    const username = document.getElementById("customUsername").value.trim();

    if (username.length < 4) {
      showMessage("Username must be at least 4 characters ❌", "text-red-400");
      return;
    }

    if (!/^[a-zA-Z0-9_.]+$/.test(username)) {
      showMessage("Only letters, numbers, . and _ allowed ❌", "text-red-400");
      return;
    }

    if (takenUsernames.includes(username.toLowerCase())) {
      showMessage("Username already taken ❌", "text-red-400");
      return;
    }

    localStorage.setItem("username", username);
    localStorage.setItem("solvoUser", username); // Save for chatbot
    showMessage("Username saved successfully ✅ Redirecting...", "text-green-400");

    setTimeout(() => {
      window.location.href = "login.html";
    }, 1500);
  }

  function showMessage(text, colorClass) {
    const msg = document.getElementById("message");
    msg.className = "mt-4 text-center text-sm " + colorClass;
    msg.innerText = text;
  }
</script>

</body>
</html>
