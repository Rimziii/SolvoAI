<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Solvo AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="dark">

<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <span class="name">Solvo AI</span>
    </div>
    <div class="top">
      <button class="new-chat" onclick="newChat()">+ New Chat</button>
      <button class="collapse" onclick="toggleSidebar()">☰</button>
    </div>

    <div class="conversations" id="conversationList"></div>

    <div class="bottom">
      <select id="themeSelect">
        <option value="dark">Dark</option>
        <option value="light">Light</option>
        <option value="levo">Levo</option>
      </select>
      <button onclick="goToLogin()">Login</button>
    </div>
  </aside>

  <!-- Main Chat -->
  <main class="main">
    <div id="messages" class="messages"></div>

    <div class="input-area">
      <textarea id="userInput" rows="1" placeholder="Message Solvo AI..."></textarea>
      <button onclick="sendMessage()">➤</button>
    </div>
  </main>

</div>

<script src="app.js"></script>
</body>
</html>
